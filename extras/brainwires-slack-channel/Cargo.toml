[package]
name = "brainwires-slack-channel"
publish = false
description = "Slack channel adapter for Brainwires — connects Slack via Socket Mode to the brainwires-gateway as an MCP-capable channel server"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
authors.workspace = true
documentation = "https://docs.rs/brainwires-slack-channel"

[lib]
name = "brainwires_slack_channel"
path = "src/lib.rs"

[[bin]]
name = "brainwires-slack"
path = "src/main.rs"
doc = false

[dependencies]
brainwires-channels = { workspace = true }
brainwires-core = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
clap = { version = "4", features = ["derive", "env"] }
anyhow = { workspace = true }
reqwest = { workspace = true }
tokio-tungstenite = { workspace = true }
futures = { workspace = true }
rmcp = { workspace = true, features = ["server", "transport-io", "macros"] }
async-trait = { workspace = true }
schemars = { workspace = true }
tokio-util = { workspace = true }
url = { workspace = true }
