[package]
name = "voice-assistant"
description = "Personal voice assistant built on the Brainwires framework"
version.workspace = true
edition.workspace = true
publish = false
license.workspace = true
rust-version.workspace = true

[[bin]]
name = "voice-assistant"
path = "src/main.rs"

[features]
wake-word = ["brainwires-hardware/wake-word"]
wake-word-rustpotter = ["brainwires-hardware/wake-word-rustpotter"]

[dependencies]
brainwires-hardware = { workspace = true, features = ["voice-assistant"] }
brainwires-providers = { workspace = true }
brainwires-core = { workspace = true }
brainwires-agents = { workspace = true }
brainwires-resilience = { workspace = true }
brainwires-session = { workspace = true, features = ["sqlite"] }

tokio = { workspace = true, features = ["full"] }
async-trait.workspace = true
tracing.workspace = true
tracing-subscriber = { workspace = true }
anyhow.workspace = true
serde = { workspace = true }
serde_json.workspace = true
toml.workspace = true
dirs.workspace = true
clap = { version = "4", features = ["derive"] }
ctrlc = { version = "3", features = ["termination"] }

[dev-dependencies]
tempfile = { workspace = true }
