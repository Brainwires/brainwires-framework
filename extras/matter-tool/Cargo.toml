[package]
name = "matter-tool"
description = "Commission and control Matter 1.3 devices using the Brainwires Matter stack"
version.workspace = true
edition.workspace = true
publish = false
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
readme = "README.md"

[[bin]]
name = "matter-tool"
path = "src/main.rs"

[features]
default = []
# BLE commissioning window (btleplug peripheral, Linux/macOS)
ble = ["brainwires-hardware/matter-ble"]

[dependencies]
brainwires-hardware = { workspace = true, features = ["matter"] }
tokio = { workspace = true, features = ["full"] }
anyhow.workspace = true
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }
serde_json.workspace = true
dirs.workspace = true
hex.workspace = true
clap = { version = "4", features = ["derive"] }
mdns-sd.workspace = true

[dev-dependencies]
tempfile.workspace = true
