<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrainClaw Chat</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #header {
            background: #16213e;
            padding: 12px 20px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #e94560;
        }

        #status {
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 10px;
            background: #333;
            color: #999;
        }

        #status.connected {
            background: #1b4332;
            color: #95d5b2;
        }

        #status.disconnected {
            background: #4a1a1a;
            color: #e07070;
        }

        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 14px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user {
            align-self: flex-end;
            background: #0f3460;
            color: #e0e0e0;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: #2a2a3e;
            color: #d0d0d0;
            border-bottom-left-radius: 4px;
        }

        .message.system {
            align-self: center;
            background: transparent;
            color: #666;
            font-size: 12px;
            font-style: italic;
        }

        .typing-indicator {
            align-self: flex-start;
            padding: 10px 14px;
            background: #2a2a3e;
            border-radius: 12px;
            border-bottom-left-radius: 4px;
            display: none;
        }

        .typing-indicator.visible {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #666;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-3px); }
        }

        #input-bar {
            padding: 12px 20px;
            background: #16213e;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 10px;
        }

        #message-input {
            flex: 1;
            padding: 10px 14px;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        #message-input:focus {
            border-color: #e94560;
        }

        #message-input::placeholder {
            color: #555;
        }

        #send-btn {
            padding: 10px 20px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        #send-btn:hover {
            background: #c73e54;
        }

        #send-btn:disabled {
            background: #555;
            cursor: not-allowed;
        }

        #messages::-webkit-scrollbar {
            width: 6px;
        }

        #messages::-webkit-scrollbar-track {
            background: transparent;
        }

        #messages::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>BrainClaw Chat</h1>
        <span id="status" class="disconnected">Disconnected</span>
    </div>
    <div id="chat-container">
        <div id="messages"></div>
        <div class="typing-indicator" id="typing-indicator">
            <span></span><span></span><span></span>
        </div>
        <div id="input-bar">
            <input type="text" id="message-input" placeholder="Type a message..." disabled />
            <button id="send-btn" disabled>Send</button>
        </div>
    </div>
    <script>
        const messagesEl = document.getElementById("messages");
        const inputEl = document.getElementById("message-input");
        const sendBtn = document.getElementById("send-btn");
        const statusEl = document.getElementById("status");
        const typingEl = document.getElementById("typing-indicator");

        let ws = null;
        let reconnectTimer = null;
        let reconnectDelay = 1000;
        const MAX_RECONNECT_DELAY = 30000;

        function getWsUrl() {
            const proto = location.protocol === "https:" ? "wss:" : "ws:";
            return proto + "//" + location.host + "/chat/ws";
        }

        function connect() {
            if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
                return;
            }

            ws = new WebSocket(getWsUrl());

            ws.onopen = function () {
                statusEl.textContent = "Connected";
                statusEl.className = "connected";
                inputEl.disabled = false;
                sendBtn.disabled = false;
                inputEl.focus();
                reconnectDelay = 1000;
                addSystemMessage("Connected to chat server.");
            };

            ws.onmessage = function (evt) {
                hideTyping();
                try {
                    const event = JSON.parse(evt.data);
                    if (event.MessageReceived) {
                        const msg = event.MessageReceived;
                        const text = extractText(msg.content);
                        if (text) {
                            addMessage(text, "assistant");
                        }
                    }
                } catch (_e) {
                    // If it is not JSON, display as plain text
                    addMessage(evt.data, "assistant");
                }
            };

            ws.onclose = function () {
                statusEl.textContent = "Disconnected";
                statusEl.className = "disconnected";
                inputEl.disabled = true;
                sendBtn.disabled = true;
                hideTyping();
                addSystemMessage("Disconnected. Reconnecting...");
                scheduleReconnect();
            };

            ws.onerror = function () {
                // onclose will fire after onerror
            };
        }

        function scheduleReconnect() {
            if (reconnectTimer) return;
            reconnectTimer = setTimeout(function () {
                reconnectTimer = null;
                connect();
                reconnectDelay = Math.min(reconnectDelay * 2, MAX_RECONNECT_DELAY);
            }, reconnectDelay);
        }

        function extractText(content) {
            if (typeof content === "string") return content;
            if (content && content.Text) return content.Text;
            if (content && content.RichText) return content.RichText.markdown || content.RichText.fallback_plain;
            return "";
        }

        function sendMessage() {
            const text = inputEl.value.trim();
            if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

            addMessage(text, "user");
            inputEl.value = "";

            const event = {
                MessageReceived: {
                    id: crypto.randomUUID(),
                    conversation: {
                        platform: "webchat",
                        channel_id: "webchat",
                        server_id: null
                    },
                    author: "webchat-user",
                    content: { Text: text },
                    thread_id: null,
                    reply_to: null,
                    timestamp: new Date().toISOString(),
                    attachments: [],
                    metadata: {}
                }
            };

            ws.send(JSON.stringify(event));
            showTyping();
        }

        function addMessage(text, role) {
            const el = document.createElement("div");
            el.className = "message " + role;
            el.textContent = text;
            messagesEl.appendChild(el);
            scrollToBottom();
        }

        function addSystemMessage(text) {
            const el = document.createElement("div");
            el.className = "message system";
            el.textContent = text;
            messagesEl.appendChild(el);
            scrollToBottom();
        }

        function showTyping() {
            typingEl.classList.add("visible");
            scrollToBottom();
        }

        function hideTyping() {
            typingEl.classList.remove("visible");
        }

        function scrollToBottom() {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        sendBtn.addEventListener("click", sendMessage);
        inputEl.addEventListener("keydown", function (e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        connect();
    </script>
</body>
</html>
