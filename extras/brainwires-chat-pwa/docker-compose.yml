# brainwires-chat-pwa — local & single-host deployment.
#
# Build context is the workspace root because the wasm crate depends on
# `../../../crates/brainwires-*`. Run from this directory:
#
#   cp .env.example .env      # then edit .env to taste
#   docker compose up --build              # plain prod-style launch
#   DEV_MODE=true docker compose watch     # live-edit via develop.watch
#
# .env is auto-loaded by Docker Compose from this directory and is
# git-ignored. Variables not set in .env fall back to the defaults below.

services:
  chat-pwa:
    build:
      context: ../..
      dockerfile: extras/brainwires-chat-pwa/Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-}
        BUILD_COMMIT: ${BUILD_COMMIT:-}
        BUILD_VERSION: ${BUILD_VERSION:-0.1.0}
        DEV_MODE: ${DEV_MODE:-false}
    image: brainwires-chat-pwa:latest
    env_file:
      - path: .env
        required: false
    ports:
      - "${HOST_PORT:-8080}:80"
    environment:
      # Runtime overrides — entrypoint.sh rewrites build-info.js with
      # these values at container start.
      - BRAINWIRES_DEV_MODE=${DEV_MODE:-false}
      - BRAINWIRES_BUILD_DATE=${BUILD_DATE:-}
      - BRAINWIRES_BUILD_COMMIT=${BUILD_COMMIT:-}
      - BRAINWIRES_BUILD_VERSION=${BUILD_VERSION:-0.1.0}
    restart: unless-stopped
    # Compose 2.22+ file-watch. `docker compose watch` syncs the bundled
    # web output into the running nginx docroot and rebuilds the image
    # for any change that affects the image itself. Plain `docker
    # compose up` ignores this block, so prod is unaffected.
    develop:
      watch:
        # Sync the bundled web output into nginx's docroot.
        # esbuild --watch and wasm-pack regenerate these on the host.
        - action: sync
          path: ./web
          target: /usr/share/nginx/html
          ignore:
            - node_modules/
            - src/                  # source modules; the bundled app.js is what gets synced
            - tests/
            - build.mjs
            - build.sh
            - dev.sh
            - package.json
            - package-lock.json
            - eslint.config.js
            - .gitignore
            - sw.bundle.js          # build intermediate

        # Image-level changes require a full rebuild.
        - action: rebuild
          path: ./Dockerfile
        - action: rebuild
          path: ./entrypoint.sh
        - action: rebuild
          path: ./nginx.conf
        - action: rebuild
          path: ./wasm/Cargo.toml
        - action: rebuild
          path: ./.dockerignore
