# Live-edit overlay for chat-pwa. Use:
#
#   DEV_MODE=true docker compose \
#     -f docker-compose.yml \
#     -f docker-compose.dev.yml \
#     up --build
#
# (or just `./web/dev.sh` — see that script for the full orchestration.)
#
# Mounts the host's already-built static output (web/) into the running
# nginx container's docroot. Combined with `npm run watch` rebuilding
# app.js / sw.js on save, edits land in the browser within ~50ms. The
# wasm/ side requires `wasm-pack build` (or `./web/dev.sh`'s
# cargo-watch loop) to regenerate web/pkg/.

services:
  chat-pwa:
    volumes:
      - ./web:/usr/share/nginx/html:ro
    environment:
      - BRAINWIRES_DEV_MODE=true
