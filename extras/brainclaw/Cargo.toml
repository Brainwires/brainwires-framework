[workspace]
members = [
    "daemon",
    "gateway",
    "mcp-discord",
    "mcp-telegram",
    "mcp-slack",
    "mcp-skill-registry",
]
resolver = "2"

[workspace.package]
version = "0.6.0"
edition = "2024"
license = "MIT OR Apache-2.0"
rust-version = "1.91"
repository = "https://github.com/Brainwires/brainwires-framework"
homepage = "https://github.com/Brainwires/brainwires-framework"
authors = ["Brainwires"]
publish = false

[workspace.dependencies]
# Brainwires framework crates (path deps to monorepo)
brainwires-core = { path = "../../crates/brainwires-core" }
brainwires-agents = { path = "../../crates/brainwires-agents" }
brainwires-providers = { path = "../../crates/brainwires-providers" }
brainwires-tool-system = { path = "../../crates/brainwires-tool-system" }
brainwires-channels = { path = "../../crates/brainwires-channels" }
brainwires-skills = { path = "../../crates/brainwires-skills" }
brainwires-gateway = { path = "gateway" }

# Async runtime & utilities
tokio = { version = "1.43", features = ["full"] }
futures = "0.3"
async-trait = "0.1"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Error handling
anyhow = "1"

# Identifiers & time
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# HTTP
reqwest = { version = "0.12", features = ["json", "stream"] }
axum = "0.8"

# Logging
tracing = "0.1"
tracing-subscriber = "0.3"

# WebSocket
tokio-tungstenite = { version = "0.26", features = ["native-tls"] }

# Discord API
serenity = { version = "0.12", default-features = false, features = ["client", "gateway", "model", "cache", "rustls_backend", "chrono"] }

# Telegram Bot API
teloxide = { version = "0.13", features = ["macros"] }

# MCP protocol
rmcp = { version = "1.1", features = ["client", "server", "client-side-sse", "transport-child-process", "transport-io", "macros"] }

# MCP server support
schemars = "1.0"
tokio-util = "0.7"

# Config
toml = "1.0"
clap = { version = "4", features = ["derive", "env"] }

# Filesystem
dirs = "6"

# Concurrent maps
dashmap = "6"

# Regex
regex = "1"

# URL parsing
url = "2.5"

# SQLite
rusqlite = { version = "0.38", features = ["bundled"] }

# Semantic versioning
semver = { version = "1", features = ["serde"] }

# Hashing & HMAC
sha2 = "0.10"
hmac = "0.12"
hex = "0.4"

# Testing
tempfile = "3"
