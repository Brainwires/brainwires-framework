[package]
name = "brainclaw"
publish = false
description = "BrainClaw — personal AI assistant daemon built on the Brainwires Framework"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true

[lib]
name = "brainclaw"
path = "src/lib.rs"

[[bin]]
name = "brainclaw"
path = "src/main.rs"
doc = false

[dependencies]
brainwires-gateway = { path = "../brainwires-gateway" }
brainwires-agents.workspace = true
brainwires-providers.workspace = true
brainwires-tool-system.workspace = true
brainwires-channels.workspace = true
brainwires-skills.workspace = true
brainwires-core.workspace = true

tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
toml.workspace = true
clap = { version = "4", features = ["derive", "env"] }
tracing.workspace = true
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow.workspace = true
uuid.workspace = true
chrono.workspace = true
dirs.workspace = true

[dev-dependencies]
tempfile = { workspace = true }
tokio = { workspace = true, features = ["test-util"] }

[features]
default = ["native-tools"]
native-tools = ["brainwires-tool-system/native"]
email = ["brainwires-tool-system/email"]
calendar = ["brainwires-tool-system/calendar"]
