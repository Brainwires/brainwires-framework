[package]
name = "brainclaw"
description = "BrainClaw — personal AI assistant daemon built on the Brainwires Framework"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
publish.workspace = true

[lib]
name = "brainclaw"
path = "src/lib.rs"

[[bin]]
name = "brainclaw"
path = "src/main.rs"
doc = false

[dependencies]
brainwires-gateway.workspace = true
brainwires-agents.workspace = true
brainwires-providers.workspace = true
brainwires-tool-system.workspace = true
brainwires-channels.workspace = true
brainwires-skills.workspace = true
brainwires-core.workspace = true
brainwires-hardware = { workspace = true, optional = true, features = ["audio"] }

tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
toml.workspace = true
clap.workspace = true
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }
anyhow.workspace = true
uuid.workspace = true
chrono.workspace = true
dirs.workspace = true

[dev-dependencies]
tempfile.workspace = true
tokio = { workspace = true, features = ["test-util"] }

[features]
default = ["native-tools"]
native-tools = ["brainwires-tool-system/native"]
email = ["brainwires-tool-system/email"]
calendar = ["brainwires-tool-system/calendar"]
rag = ["brainwires-tool-system/rag"]
browser = ["brainwires-tool-system/browser"]
voice = ["dep:brainwires-hardware", "brainwires-gateway/voice"]
