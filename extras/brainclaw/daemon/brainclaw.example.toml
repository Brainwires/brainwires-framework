# BrainClaw — Personal AI Assistant Daemon
# Copy this to ~/.brainclaw/brainclaw.toml or ./brainclaw.toml

# ── Gateway (WebSocket server) ───────────────────────────────────────────────

[gateway]
# Host address to bind to
host = "127.0.0.1"
# Port to listen on
port = 18789
# Maximum concurrent channel connections
max_connections = 256
# Session inactivity timeout (seconds)
session_timeout_secs = 3600
# Allowed API tokens for channel auth (empty = open/dev mode)
auth_tokens = []

# ── AI Provider ──────────────────────────────────────────────────────────────

[provider]
# Provider: anthropic, openai, google, groq, ollama, brainwires, together,
#           fireworks, anyscale, bedrock, vertex-ai
default_provider = "anthropic"
# Model name (omit to use provider default)
# default_model = "claude-sonnet-4-20250514"
# API key (prefer env vars or api_key_env instead)
# api_key = "sk-..."
# Environment variable containing the API key
# api_key_env = "ANTHROPIC_API_KEY"
# Sampling temperature (0.0 - 2.0)
temperature = 0.7
# Maximum tokens to generate
max_tokens = 16384

# ── Agent Behaviour ──────────────────────────────────────────────────────────

[agent]
# Maximum tool-call rounds per message
max_tool_rounds = 10
# Maximum concurrent agent sessions
max_concurrent_sessions = 50
# Session idle timeout (seconds)
session_idle_timeout_secs = 1800

# ── Tools ────────────────────────────────────────────────────────────────────

[tools]
# Tool groups to enable: bash, files, git, search, web, validation
enabled = ["bash", "files", "git", "search", "web", "validation"]
# Tool groups to explicitly disable (overrides enabled)
disabled = []
# Whether shell/bash execution is allowed
bash_allowed = true

# ── Persona ──────────────────────────────────────────────────────────────────

[persona]
# Name of the assistant persona
name = "BrainClaw"
# Inline system prompt (optional)
# system_prompt = "You are a helpful assistant."
# Path to a file containing the system prompt (takes precedence over inline)
# system_prompt_file = "/path/to/system_prompt.md"

# ── Memory ───────────────────────────────────────────────────────────────────

[memory]
# Enable conversation memory
enabled = true
# Directory for memory storage
storage_dir = "~/.brainclaw/memory"
# Maximum history messages to keep per session
max_history_messages = 100

# ── Skills ───────────────────────────────────────────────────────────────────

[skills]
# Enable the SKILL.md-based skill system (/command dispatch)
enabled = true
# Directories to scan for SKILL.md files.
# The bundled skills in the repo provide: /daily-standup, /summarize,
# /code-review, /translate, /weather, /export
# Add ~/.brainclaw/skills for your own custom skills.
directories = ["./skills", "~/.brainclaw/skills"]
# Optional: URL of a running skill registry server (brainclaw-mcp-skill-registry).
# When set, /commands not found locally are looked up in the registry and
# downloaded on demand.
# registry_url = "http://localhost:8765"

# ── Cron / Scheduled Tasks ───────────────────────────────────────────────────

[cron]
# Enable cron-based scheduled tasks
enabled = false
# Directory where cron job definitions are stored (JSON files)
storage_dir = "~/.brainclaw/cron"

# ── Hooks ────────────────────────────────────────────────────────────────────
#
# Shell hooks let you intercept and react to framework events via scripts.
# Each script receives the event as JSON on stdin.
# pre_tool_use: exit non-zero to block the tool call; first line of stdout
#               is used as the rejection reason shown to the agent.
# Other hooks are informational; their exit code is ignored.

[hooks]
# pre_tool_use  = "~/.brainclaw/hooks/pre-tool.sh"
# post_tool_use = "~/.brainclaw/hooks/post-tool.sh"
# session_start = "~/.brainclaw/hooks/session-start.sh"
# session_end   = "~/.brainclaw/hooks/session-end.sh"

# ── Security ─────────────────────────────────────────────────────────────────

[security]
# Allowed WebSocket origins (empty = allow all, for dev mode)
allowed_origins = []
# Strip system-message spoofing from inbound messages
strip_system_spoofing = true
# Redact secrets (API keys, etc.) in outbound messages
redact_secrets_in_output = true
# Rate limits per user
max_messages_per_minute = 20
max_tool_calls_per_minute = 30
# Require cryptographic signatures on skill packages
require_signed_skills = false
# Require interactive approval before tool execution (sends yes/no prompt to user)
require_tool_approval = false
# Specific tools that require approval (empty = all tools).
# Example: ["bash", "file_write", "http_request"]
approval_tools = []

# ── Sandbox ──────────────────────────────────────────────────────────────────
#
# When enabled, the built-in tool executor is wrapped in a SandboxedToolExecutor
# that routes `bash`/`execute_command` and `execute_code`/`code_exec` calls
# through a container runtime (Docker or Podman). Requires the `sandbox`
# build feature (on by default).

[sandbox]
# Enable container-based isolation for dangerous tool calls.
enabled = true
# Which runtime to use: "docker", "podman", or "host" (dev-only; requires
# the `sandbox-unsafe-host` build feature and provides NO isolation).
runtime = "docker"
# Container image launched for each sandboxed call.
image = "ghcr.io/brainwires/brainclaw-sandbox:latest"
# Resource limits. Set to the commented-out value to disable a specific limit.
cpu_limit = 2.0
memory_limit_mb = 1024
pid_limit = 256
# Network policy: "none" (no network) or "full" (unrestricted). "limited" is
# accepted by the schema but currently rejected by the Docker backend.
network = "none"
# Optional workspace directory bind-mounted into the container. If set, the
# sandbox's default workdir becomes this path.
# workspace_mount = "/home/user/project"
# Additional host paths permitted as bind-mount sources.
allowed_mount_sources = []
# Wall-clock timeout applied to each sandboxed tool call (seconds).
default_timeout_secs = 300
# If true, fall back to the unsandboxed executor when the sandbox backend
# cannot be constructed (e.g. Docker socket missing). Default: false — a
# broken sandbox is a hard error, not a silent downgrade to host execution.
fallback_to_host_on_error = false
