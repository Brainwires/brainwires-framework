[package]
name = "brainwires-brain-server"
publish = false
description = "Open Brain MCP server binary — exposes persistent knowledge (thoughts, PKS, BKS) to any AI tool via MCP protocol"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
authors.workspace = true
documentation = "https://docs.rs/brainwires-brain-server"

[lib]
name = "brainwires_brain_server"
path = "src/lib.rs"

[[bin]]
name = "brainwires-brain"
path = "src/main.rs"
doc = false

[dependencies]
brainwires-brain = { workspace = true }
rmcp = { workspace = true, features = ["server", "transport-io", "macros"] }
schemars.workspace = true
tokio-util.workspace = true
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
tokio.workspace = true
clap = { version = "4", features = ["derive"] }
