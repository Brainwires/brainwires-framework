[package]
name = "audio-demo-ffi"
description = "UniFFI bindings for brainwires-audio — exposes TTS/STT to C#, Kotlin, Swift, Python"
publish = false
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]
name = "audio_demo_ffi"

[dependencies]
brainwires-audio = { workspace = true, features = ["native"] }
brainwires-providers = { workspace = true }
uniffi = { version = "0.29", features = ["cli"] }
tokio = { workspace = true }
base64 = { workspace = true }
thiserror = { workspace = true }

[build-dependencies]
uniffi = { version = "0.29", features = ["build"] }
