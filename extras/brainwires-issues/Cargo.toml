[package]
name = "brainwires-issues"
publish = false
description = "Issue tracking MCP server — lightweight project issue and bug tracking"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
authors.workspace = true

[lib]
name = "brainwires_issues"
path = "src/lib.rs"

[[bin]]
name = "brainwires-issues"
path = "src/main.rs"
doc = false

[dev-dependencies]
async-trait = { workspace = true }
tokio = { workspace = true, features = ["full", "test-util"] }

[build-dependencies]
chrono = "0.4"

[dependencies]
brainwires-storage = { workspace = true, features = ["native"] }
rmcp = { workspace = true, features = ["server", "transport-io", "macros"] }
schemars.workspace = true
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
tokio.workspace = true
uuid = { workspace = true }
chrono.workspace = true
clap = { version = "4", features = ["derive", "env"] }
