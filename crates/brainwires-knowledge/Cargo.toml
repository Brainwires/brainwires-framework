[package]
name = "brainwires-knowledge"
description = "Behavioral and personal knowledge systems for the Brainwires Agent Framework"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
authors.workspace = true

[dependencies]
# Internal crates
brainwires-core.workspace = true

# SQLite (for knowledge caches, native only)
rusqlite = { workspace = true, optional = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Error handling
anyhow.workspace = true

# Identifiers & time
uuid.workspace = true
chrono.workspace = true

# Async runtime
tokio = { version = "1.43", features = ["sync", "time"] }

# Logging
tracing.workspace = true

# HTTP client (for API sync, native only)
reqwest = { workspace = true, optional = true }

# Regex (for pattern matching in collectors)
regex.workspace = true

# URL encoding (for API queries)
urlencoding.workspace = true

[features]
default = ["native"]
native = ["dep:rusqlite", "dep:reqwest", "tokio/rt", "brainwires-core/native"]
wasm = ["brainwires-core/wasm"]

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
tempfile.workspace = true
