[package]
name = "brainwires-prompting"
description = "Adaptive prompting techniques, task clustering, and temperature optimization for the Brainwires Agent Framework"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
authors.workspace = true

[dependencies]
# Internal crates
brainwires-core.workspace = true
brainwires-knowledge.workspace = true

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Error handling
anyhow.workspace = true

# Async
tokio = { version = "1.43", features = ["sync", "time"] }

# Time
chrono.workspace = true

# Logging
tracing.workspace = true

# ML / Clustering (native only)
linfa = { workspace = true, optional = true }
linfa-clustering = { workspace = true, optional = true }
ndarray = { workspace = true, optional = true }

# Storage (native only)
rusqlite = { workspace = true, optional = true }
bincode = { workspace = true, optional = true }

[features]
default = ["native"]
native = ["dep:rusqlite", "dep:linfa", "dep:linfa-clustering", "dep:ndarray", "dep:bincode", "tokio/rt", "tokio/fs", "tokio/process", "tokio/macros"]
wasm = ["brainwires-core/wasm"]

[dev-dependencies]
tempfile.workspace = true
