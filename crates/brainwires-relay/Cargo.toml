[package]
name = "brainwires-relay"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "MCP server framework, relay client, and agent communication backbone for Brainwires"
readme = "README.md"
documentation = "https://docs.rs/brainwires-relay"
keywords = ["relay", "ipc", "mcp", "remote-control", "agent-communication"]
categories = ["network-programming"]

[dependencies]
# Core framework
brainwires-core = { workspace = true }
brainwires-mcp = { workspace = true }

# Async runtime
tokio = { workspace = true, features = ["io-std", "io-util", "sync", "time", "macros", "net", "process", "fs"] }
futures = { workspace = true }
async-trait = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Error handling
anyhow = { workspace = true }
thiserror = { workspace = true }

# Logging
tracing = { workspace = true }

# Crypto (IPC encryption)
chacha20poly1305 = { workspace = true }
sha2 = { workspace = true }
rand = { workspace = true }
zeroize = { workspace = true }
base64 = { workspace = true }
hex = { workspace = true }
subtle = { workspace = true }

# HTTP client
reqwest = { workspace = true }
regex = { workspace = true }

# Time & identifiers
chrono = { workspace = true }
uuid = { workspace = true }

# WebSocket (Supabase Realtime)
tokio-tungstenite = { workspace = true }
url = { workspace = true }

# Hostname detection
gethostname = { workspace = true }

# Compression (attachments)
flate2 = { workspace = true }
zstd = { workspace = true }

# Keyring (optional, for secure API key storage)
keyring = { workspace = true, optional = true }

[features]
default = ["server", "client"]
server = []
client = []
auth-keyring = ["keyring"]

[dev-dependencies]
tempfile = { workspace = true }
