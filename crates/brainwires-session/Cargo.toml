[package]
name = "brainwires-session"
description = "Pluggable session-persistence backend for the Brainwires Agent Framework"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
readme = "README.md"
documentation = "https://docs.rs/brainwires-session"
keywords = ["sessions", "persistence", "llm", "agent"]
categories = ["asynchronous", "database"]

[dependencies]
brainwires-core = { workspace = true }
anyhow = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["sync"] }
tracing = { workspace = true }
chrono = { workspace = true }

rusqlite = { workspace = true, optional = true }

[features]
default = []
sqlite = ["dep:rusqlite"]

[dev-dependencies]
tempfile.workspace = true
tokio = { workspace = true, features = ["full", "test-util"] }
