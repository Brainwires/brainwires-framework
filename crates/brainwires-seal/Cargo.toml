[package]
name = "brainwires-seal"
description = "SEAL (Self-Evolving Agentic Learning) integration for the Brainwires Agent Framework"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
readme = "README.md"
documentation = "https://docs.rs/brainwires-seal"
keywords = ["self-learning", "ai-agents", "feedback", "prompt-optimization", "autonomous"]
categories = ["development-tools"]

[dependencies]
brainwires-core = { workspace = true }
brainwires-tool-system = { workspace = true }
brainwires-agents = { workspace = true }
brainwires-mdap = { workspace = true, optional = true }
brainwires-brain = { workspace = true, optional = true }
brainwires-permissions = { workspace = true, optional = true }
anyhow = { workspace = true }
regex = { workspace = true }
chrono = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
tokio = { workspace = true, optional = true }

[features]
default = ["native"]
native = ["brainwires-core/native"]
mdap = ["dep:brainwires-mdap"]
knowledge = ["dep:brainwires-brain", "dep:tokio"]
feedback = ["dep:brainwires-permissions", "dep:tokio"]

[dev-dependencies]
brainwires-storage = { workspace = true }
brainwires-brain = { workspace = true }
brainwires-permissions = { workspace = true }
serde_json = { workspace = true }
tempfile = { workspace = true }
