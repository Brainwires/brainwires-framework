[package]
name = "brainwires-tools"
description = "Façade re-exporting `brainwires-tool-runtime` (executor, registry, orchestrator, sessions, ...) and `brainwires-tool-builtins` (bash, file_ops, git, web, search, code_exec, browser, email, calendar, system) for the Brainwires Agent Framework"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
readme = "README.md"
documentation = "https://docs.rs/brainwires-tools"
keywords = ["ai-tools", "llm", "file-operations", "code-search", "validation"]
categories = ["development-tools"]

[dependencies]
# Façade — pure re-exports of the runtime + builtins.
brainwires-core.workspace = true
brainwires-tool-runtime = { workspace = true }
brainwires-tool-builtins = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
tempfile = "3"
criterion = { version = "0.5", features = ["html_reports"] }
proptest.workspace = true

[features]
default = ["native"]

# Each flag delegates to the matching feature on the underlying crate(s).
# `brainwires-tools::*` keeps offering the same surface as before the split.

native = [
    "brainwires-tool-runtime/native",
    "brainwires-tool-builtins/native",
]
wasm = [
    "brainwires-tool-runtime/wasm",
    "brainwires-tool-builtins/wasm",
]

# Runtime-side features
orchestrator = ["brainwires-tool-runtime/orchestrator", "brainwires-tool-builtins/orchestrator"]
orchestrator-wasm = ["brainwires-tool-runtime/orchestrator-wasm", "brainwires-tool-builtins/orchestrator-wasm"]
oauth = ["brainwires-tool-runtime/oauth"]
openapi = ["brainwires-tool-runtime/openapi"]
sandbox = ["brainwires-tool-runtime/sandbox"]
sessions = ["brainwires-tool-runtime/sessions"]

# Builtin-side features
rag = [
    "brainwires-tool-runtime/rag",
    "brainwires-tool-builtins/rag",
]
# Tree-sitter language parsers are always-on inside `brainwires-rag` post-Phase-6.
# Kept as a feature alias for back-compat with consumers that opted in by name.
rag-full-languages = ["rag"]
interpreters = ["brainwires-tool-builtins/interpreters"]
interpreters-rhai = ["brainwires-tool-builtins/interpreters-rhai"]
interpreters-lua = ["brainwires-tool-builtins/interpreters-lua"]
interpreters-js = ["brainwires-tool-builtins/interpreters-js"]
interpreters-all = ["brainwires-tool-builtins/interpreters-all"]
interpreters-wasm = ["brainwires-tool-builtins/interpreters-wasm"]
email = ["brainwires-tool-builtins/email"]
calendar = ["brainwires-tool-builtins/calendar"]
browser = ["brainwires-tool-builtins/browser"]
system = ["brainwires-tool-builtins/system"]
reactor = ["brainwires-tool-builtins/reactor"]
services = ["brainwires-tool-builtins/services"]
system-full = ["brainwires-tool-builtins/system-full"]

full = [
    "orchestrator", "rag", "interpreters", "openapi", "email", "calendar",
    "browser", "oauth", "system", "sandbox", "sessions",
]

# Examples / benches that previously lived in this crate are kept here
# so historical `cargo run -p brainwires-tools --example ...` invocations
# still work.

[[bench]]
name = "token_comparison"
harness = false
required-features = ["orchestrator"]

[[example]]
name = "expense_aggregation"
required-features = ["orchestrator"]

[[example]]
name = "file_operations"
required-features = ["orchestrator"]

[[example]]
name = "multi_api"
required-features = ["orchestrator"]

[[example]]
name = "tool_registry"

[[example]]
name = "tool_prehook"

[[example]]
name = "sandboxed_executor"
required-features = ["sandbox"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
