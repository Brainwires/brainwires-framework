[package]
name = "brainwires-tools"
description = "Built-in tool implementations for the Brainwires Agent Framework"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
readme = "README.md"
documentation = "https://docs.rs/brainwires-tools"
keywords = ["ai-tools", "llm", "file-operations", "code-search", "validation"]
categories = ["development-tools"]

[dependencies]
# Always available
brainwires-core.workspace = true

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Error handling
anyhow.workspace = true
thiserror = { workspace = true }

# Async traits
async-trait.workspace = true

# Async runtime
tokio = { version = "1.43", features = ["time"] }

# File operations (native only)
walkdir = { version = "2", optional = true }
diffy = { version = "0.4", optional = true }
glob = { version = "0.3", optional = true }

# Code search
regex = "1"
ignore = { version = "0.4", optional = true }

# Git operations (native only)
git2 = { version = "0.20", optional = true }

# Web operations (native only)
reqwest = { workspace = true, optional = true }

# Security (native only)
zeroize = { version = "1", features = ["derive"], optional = true }
sha2 = { workspace = true }
hex = { workspace = true }

# Identifiers (for TransactionManager staging dir names)
uuid = { workspace = true }

# Logging
tracing.workspace = true

# Scripting engine (behind orchestrator or orchestrator-wasm feature)
rhai = { version = "1.23", default-features = false, features = ["serde", "std"], optional = true }
web-time = { version = "1.1", optional = true }

# OpenAPI spec parsing (behind openapi feature)
openapiv3 = { version = "2", optional = true }
serde_yml = { version = "0.0.12", optional = true }

# Email tools (behind email feature)
lettre = { version = "0.11", default-features = false, features = ["tokio1-native-tls", "smtp-transport", "builder"], optional = true }
async-imap = { version = "0.11", default-features = false, features = ["runtime-tokio"], optional = true }
imap-proto = { version = "0.16", optional = true }
tokio-native-tls = { version = "0.3", optional = true }
native-tls = { version = "0.2", optional = true }
futures = { workspace = true, optional = true }
mailparse = { version = "0.15", optional = true }
base64 = { version = "0.22", optional = true }
# Gmail push (behind email feature) — RS256 JWT verification for Google-signed Pub/Sub push tokens
jsonwebtoken = { version = "9", optional = true }
parking_lot = { version = "0.12", optional = true }

# URL encoding (calendar + gmail push)
urlencoding = { version = "2", optional = true }

# Calendar tools (behind calendar feature)
icalendar = { version = "0.16", optional = true }

# Session tools (behind sessions feature). chrono is workspace-shared so
# timestamps in SessionSummary / SessionMessage line up with the rest of the
# framework.
chrono = { workspace = true, optional = true }

# Feature-gated dependencies
brainwires-knowledge = { workspace = true, optional = true }
brainwires-mcp = { workspace = true, optional = true }
brainwires-sandbox = { workspace = true, optional = true }

# ── System deps (absorbed from brainwires-system) ─────────────────────────
notify = { version = "7", optional = true }

# ── Interpreter deps (absorbed from brainwires-code-interpreters) ─────────
mlua = { version = "0.10.3", features = ["lua54", "vendored"], optional = true }
boa_engine = { version = "0.21", optional = true }
tempfile = { version = "3", optional = true }
# wasm interpreter bindings
wasm-bindgen = { version = "0.2", optional = true }
js-sys = { version = "0.3", optional = true }
web-sys = { version = "0.3", features = ["console"], optional = true }
getrandom = { version = "0.2", optional = true }
serde-wasm-bindgen = { version = "0.6", optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
tempfile = "3"
criterion = { version = "0.5", features = ["html_reports"] }
proptest.workspace = true

[features]
default = ["native"]
native = [
    "dep:git2", "dep:walkdir", "dep:ignore", "dep:reqwest",
    "dep:glob", "dep:diffy", "dep:zeroize",
    "tokio/process", "tokio/fs",
    "brainwires-core/native",
]
wasm = ["brainwires-core/wasm"]
orchestrator = ["dep:rhai", "rhai/sync"]
orchestrator-wasm = ["dep:rhai", "dep:web-time"]
rag = ["dep:brainwires-knowledge", "brainwires-knowledge/rag", "brainwires-knowledge/lancedb-backend", "brainwires-knowledge/tree-sitter-languages"]
interpreters = ["interpreters-rhai", "interpreters-lua"]
interpreters-rhai = ["dep:rhai"]
interpreters-lua = ["dep:mlua"]
interpreters-js = ["dep:boa_engine"]
interpreters-python = []
interpreters-all = ["interpreters-rhai", "interpreters-lua", "interpreters-js"]
interpreters-wasm = ["dep:wasm-bindgen", "dep:js-sys", "dep:web-sys", "dep:getrandom", "dep:serde-wasm-bindgen"]
openapi = ["dep:openapiv3", "dep:serde_yml", "dep:reqwest"]
email = [
    "dep:lettre",
    "dep:async-imap",
    "dep:imap-proto",
    "dep:tokio-native-tls",
    "dep:native-tls",
    "dep:futures",
    "dep:mailparse",
    "dep:base64",
    "dep:jsonwebtoken",
    "dep:parking_lot",
    "dep:reqwest",
    "dep:chrono",
    "dep:urlencoding",
]
calendar = ["dep:icalendar", "dep:reqwest", "dep:urlencoding"]
browser = ["dep:brainwires-mcp", "native"]
# OAuth 2.0 middleware — PKCE, client credentials, token refresh, pluggable store
oauth = ["native", "dep:getrandom"]
# System primitives (absorbed from brainwires-system)
system = ["dep:notify"]
reactor = ["system"]
services = ["system"]
system-full = ["system"]
# Route dangerous tool calls (bash, code_exec) through a container sandbox
sandbox = ["dep:brainwires-sandbox", "native"]
# Agent-facing session-control tools (sessions_list / sessions_history /
# sessions_send / sessions_spawn) + `SessionBroker` trait. The host crate
# (e.g. BrainClaw gateway) implements `SessionBroker` over its real session
# registry.
sessions = ["native", "dep:chrono"]
full = ["orchestrator", "rag", "interpreters", "openapi", "email", "calendar", "browser", "oauth", "system", "sandbox", "sessions"]

[[bench]]
name = "token_comparison"
harness = false
required-features = ["orchestrator"]

[[example]]
name = "expense_aggregation"
required-features = ["orchestrator"]

[[example]]
name = "file_operations"
required-features = ["orchestrator"]

[[example]]
name = "multi_api"
required-features = ["orchestrator"]

[[example]]
name = "tool_registry"

[[example]]
name = "tool_prehook"

[[example]]
name = "sandboxed_executor"
required-features = ["sandbox"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
