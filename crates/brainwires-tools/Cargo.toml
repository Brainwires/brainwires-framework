[package]
name = "brainwires-tools"
description = "Built-in tool implementations for the Brainwires Agent Framework"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
authors.workspace = true

[dependencies]
# Always available
brainwires-core.workspace = true

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Error handling
anyhow.workspace = true

# Async runtime (for validation, web, git-search, code-exec)
tokio = { workspace = true, features = ["process", "fs", "time"] }

# File operations
walkdir = "2"
diffy = "0.4"
glob = "0.3"

# Code search
regex = "1"
ignore = "0.4"

# Git operations
git2 = "0.19"

# Web operations
reqwest = { workspace = true }

# Security
zeroize = { version = "1", features = ["derive"] }

# Logging
tracing.workspace = true

# Feature-gated dependencies
brainwires-tool-orchestrator = { workspace = true, optional = true }
brainwires-rag = { workspace = true, optional = true }
brainwires-code-interpreters = { workspace = true, optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
tempfile = "3"

[features]
default = []
orchestrator = ["dep:brainwires-tool-orchestrator"]
rag = ["dep:brainwires-rag"]
interpreters = ["dep:brainwires-code-interpreters"]
full = ["orchestrator", "rag", "interpreters"]
