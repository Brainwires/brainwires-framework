[package]
name = "brainwires-storage"
description = "LanceDB-backed storage, tiered memory, and document management for the Brainwires Agent Framework"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
authors.workspace = true

[dependencies]
# Internal crates
brainwires-core.workspace = true
brainwires-rag.workspace = true

# Vector database & columnar storage
lancedb.workspace = true
arrow-array.workspace = true
arrow-schema.workspace = true

# Async runtime
tokio = { workspace = true, features = ["sync", "time", "rt", "macros"] }
futures.workspace = true

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Error handling
anyhow.workspace = true

# Identifiers & time
uuid.workspace = true
chrono.workspace = true

# Caching (embedding memoization)
lru.workspace = true

# Hashing (file content hashing)
sha2.workspace = true

# SQLite (for lock store)
rusqlite.workspace = true

# Regex (for template matching)
regex.workspace = true

# File format processing
zip = "2"
base64 = "0.22"

# System info (for lock store)
gethostname = "1"
dirs = "6"
libc = "0.2"

# Logging
tracing.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
tempfile.workspace = true

[features]
default = []
