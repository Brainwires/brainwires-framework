[package]
name = "brainwires-agents"
description = "Agent orchestration, coordination, and lifecycle management for the Brainwires Agent Framework"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
authors.workspace = true

[dependencies]
# Internal crates
brainwires-core.workspace = true
brainwires-model-tools.workspace = true

# Async runtime
tokio = { workspace = true, features = ["sync", "time", "rt", "macros"] }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Error handling
anyhow.workspace = true

# Identifiers & time
uuid.workspace = true
chrono.workspace = true

# Hashing (for prompt hash snapshotting)
sha2.workspace = true
hex.workspace = true

# Git (for worktree management, native only)
git2 = { workspace = true, optional = true }

# Graph algorithms (for state model dependency analysis)
petgraph = "0.7"

# Process liveness checking (Unix, native only)
libc = { version = "0.2", optional = true }

# Async traits
async-trait.workspace = true

# Code search (optional, for reasoning module)
regex = { workspace = true, optional = true }

# Logging
tracing.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
futures.workspace = true
tempfile.workspace = true

[features]
default = ["native"]
native = ["dep:git2", "dep:libc", "brainwires-core/native", "brainwires-model-tools/native"]
wasm = ["brainwires-core/wasm", "brainwires-model-tools/wasm"]
# tools feature is kept for backward compatibility; brainwires-model-tools is now always available
tools = []
# Reasoning module (merged from brainwires-reasoning)
reasoning = ["dep:regex"]
