[package]
name = "brainwires-training"
description = "Training-from-scratch primitives for the Brainwires Agent Framework. Currently a placeholder — no training-from-scratch code lives here yet. For LoRA/QLoRA/DoRA fine-tuning use `brainwires-finetune-local`; for cloud fine-tune APIs (OpenAI / Anthropic / Bedrock / Vertex AI / etc.) use `brainwires-finetune`."
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
readme = "README.md"
documentation = "https://docs.rs/brainwires-training"
keywords = ["model-training", "ml", "ai-agents", "framework"]
categories = ["artificial-intelligence"]

[lib]
name = "brainwires_training"
path = "src/lib.rs"

[dependencies]
# Always-on infrastructure shared with the rest of the framework.
brainwires-core = { workspace = true }

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
