[package]
name = "brainwires-skills"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Agent skills system for Brainwires — SKILL.md parsing, registry, routing, execution"
readme = "README.md"
documentation = "https://docs.rs/brainwires-skills"
keywords = ["skills", "plugins", "extensibility", "slash-commands", "ai-agents"]
categories = ["development-tools"]

[features]
default = []
registry = ["dep:reqwest"]
signing = ["dep:ed25519-dalek", "dep:rand_core", "dep:hex"]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
serde_yml = { workspace = true }
regex = { workspace = true }
anyhow = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
tracing = { workspace = true }
chrono = { workspace = true }
semver = { workspace = true }
sha2 = { workspace = true }
reqwest = { workspace = true, optional = true }
ed25519-dalek = { version = "2", features = ["rand_core"], optional = true }
rand_core = { version = "0.6", features = ["getrandom"], optional = true }
hex = { version = "0.4", optional = true }

[dev-dependencies]
anyhow = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true }

[[example]]
name = "skill_registry"
