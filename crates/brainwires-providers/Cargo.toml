[package]
name = "brainwires-providers"
description = "AI provider implementations for the Brainwires Agent Framework"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
readme = "README.md"
documentation = "https://docs.rs/brainwires-providers"
keywords = ["ai-providers", "llm", "anthropic", "openai", "google"]
categories = ["api-bindings"]

[dependencies]
# Direct path dep (rather than `workspace = true`) so we can set
# `default-features = false`. The workspace declaration omits
# `default-features`, which would otherwise prevent us from overriding it.
# This lets wasm32 builds (e.g. the `web-speech` feature) opt out of
# brainwires-core's default `native` feature; native callers re-enable it via
# this crate's own `native` feature below.
brainwires-core = { path = "../brainwires-core", version = "0.10.0", default-features = false }
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }

# Always needed for local_llm module (always compiled)
async-trait = { workspace = true }
futures = { workspace = true }
dirs = { workspace = true }

# Local LLM inference (optional heavy dep)
llama-cpp-2 = { version = "0.1", optional = true }
encoding_rs = { workspace = true, optional = true }

# Candle-based local LLM inference (WASM-compatible, no GPU/MKL/Accelerate).
# All deps are pinned with default-features disabled and no GPU/SIMD backends.
candle-core = { version = "0.10", default-features = false, optional = true }
candle-nn = { version = "0.10", default-features = false, optional = true }
candle-transformers = { version = "0.10", default-features = false, optional = true }
tokenizers = { version = "0.22", default-features = false, features = ["fancy-regex"], optional = true }
safetensors = { version = "0.7", default-features = false, features = ["std"], optional = true }

# Image preprocessing for the multimodal vision tower (local-llm-vision feature).
# Default features off; enable common web formats only.
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp"], optional = true }

# Analytics (optional) — used on both native and wasm if `telemetry` is on.
brainwires-telemetry = { workspace = true, optional = true }
chrono = { workspace = true, optional = true }

# Browser-native speech (web-speech feature) — wasm32-only at runtime.
wasm-bindgen = { version = "0.2", optional = true }
js-sys = { version = "0.3", optional = true }
wasm-bindgen-futures = { version = "0.4", optional = true }
web-sys = { version = "0.3", optional = true, features = [
    "Window",
    "SpeechSynthesis",
    "SpeechSynthesisUtterance",
    "SpeechSynthesisVoice",
    "SpeechRecognition",
    "SpeechRecognitionEvent",
    "SpeechRecognitionResult",
    "SpeechRecognitionResultList",
    "SpeechRecognitionAlternative",
    "SpeechRecognitionError",
    "SpeechGrammarList",
    "SpeechGrammar",
] }

# All deps below are native-only. We declare them under a wasm-excluding target
# so the optional `dep:foo` references in the `native`/`bedrock`/`vertex-ai`/
# `local-llm-candle` features become no-ops on wasm32 (cargo silently ignores
# `dep:` entries whose underlying dep doesn't exist for the current target).
# This lets `cargo check ... --target wasm32-unknown-unknown` succeed even with
# `default = ["native"]` enabled.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
# HTTP providers
reqwest = { workspace = true, optional = true, features = ["multipart"] }
async-stream = { workspace = true, optional = true }
tracing = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }
uuid = { workspace = true, optional = true }
# WebSocket transport (OpenAI Responses API)
tokio-tungstenite = { workspace = true, optional = true }
url = { workspace = true, optional = true }
# Bedrock auth (AWS SigV4) — official AWS crates
aws-sigv4 = { workspace = true, optional = true }
aws-credential-types = { workspace = true, optional = true }
aws-smithy-runtime-api = { workspace = true, optional = true }
http = { workspace = true, optional = true }
# Vertex AI auth (Google OAuth2)
gcp_auth = { workspace = true, optional = true }
# `hf-hub` is only used by the native `from_hf` model loader. It enables tokio's
# `fs` feature, which doesn't compile on wasm32. WASM consumers must load model
# bytes via JS (see `CandleLlmProvider::from_bytes`).
hf-hub = { version = "0.4", default-features = false, features = ["tokio", "rustls-tls"], optional = true }

# wasm32 needs the JS-backed `getrandom` for any RNG-using transitive deps
# (uuid, candle/tokenizers via rand). We enable both 0.2 (`js`) and 0.3
# (`wasm_js`) since the dep graph includes both major versions.
#
# `web-sys` (with the `console` feature) is also pulled in unconditionally
# on wasm32 so the local-llm pipeline can emit per-step diagnostics into
# the browser console without forcing every wasm caller to opt into the
# `web-speech` feature gate.
[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2", features = ["js"] }
getrandom_v3 = { package = "getrandom", version = "0.3", features = ["wasm_js"] }
web-sys = { version = "0.3", features = ["console"] }

[features]
# No default features. Native callers must opt into `native` (the workspace
# `brainwires-providers` declaration enables it for them). This lets
# `cargo check ... --target wasm32-unknown-unknown --features web-speech`
# (and similar) succeed without `--no-default-features`.
default = []
native = [
    "brainwires-core/native",
    "dep:reqwest", "dep:async-stream",
    "dep:tracing", "dep:tokio", "dep:uuid",
    "dep:tokio-tungstenite", "dep:url",
]
# Wasm-friendly companion for `web-speech` and other future browser providers.
# Forwards `wasm` to brainwires-core (which enables chrono/wasmbind etc.).
wasm = ["brainwires-core/wasm"]
llama-cpp-2 = ["dep:tracing", "dep:tokio", "dep:llama-cpp-2", "dep:encoding_rs"]
local-llm-candle = [
    "dep:candle-core",
    "dep:candle-nn",
    "dep:candle-transformers",
    "dep:tokenizers",
    "dep:hf-hub",
    "dep:safetensors",
]
# Multimodal vision tower scaffolding (Gemma 3/4 SigLIP path). Pulls in the
# `image` crate for decode + resize, and requires `local-llm-candle` for the
# Candle Tensor/Device types used to ship the preprocessed image to the model.
local-llm-vision = [
    "local-llm-candle",
    "dep:image",
]
bedrock = ["native", "dep:aws-sigv4", "dep:aws-credential-types", "dep:aws-smithy-runtime-api", "dep:http"]
vertex-ai = ["native", "dep:gcp_auth"]
telemetry = ["dep:brainwires-telemetry", "brainwires-telemetry/native", "dep:chrono"]
# Browser-native TTS / STT providers. Only takes effect on wasm32 — on native
# targets the module is empty (see crates/brainwires-providers/src/web_speech/).
web-speech = [
    "wasm",
    "dep:wasm-bindgen",
    "dep:js-sys",
    "dep:web-sys",
    "dep:wasm-bindgen-futures",
]
# WebGPU acceleration for local-llm-candle. Forwards to candle-core/wgpu
# *and* candle-nn/wgpu + candle-transformers/wgpu so the
# `#[cfg(feature = "wgpu")]`-gated `wgpu_fwd` impls on `CustomOp*`
# implementations (rope, softmax-last-dim, …) land in the build.
# Without those, the runtime falls back to the default trait impl that
# returns "no wgpu implementation for <name>".
candle-wgpu = [
    "local-llm-candle",
    "candle-core/wgpu",
    "candle-nn/wgpu",
    "candle-transformers/wgpu",
]

[dev-dependencies]
serde_json = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
reqwest = { workspace = true }
clap = { version = "4", features = ["derive"] }
anyhow = "1"

[[example]]
name = "provider_factory"
required-features = ["native"]

[[example]]
name = "rate_limited_client"
required-features = ["native"]

# Native Gemma 4 forward-pass diagnostic rig. Reproduces the chat-pwa's
# step-0 diag scaffold against a candle WGPU device (or CPU). Used to
# verify candle-fork bug fixes without spinning up the chat-pwa Docker
# stack. See `examples/gemma4_diag.rs` for usage.
[[example]]
name = "gemma4_diag"
required-features = ["native", "local-llm-vision", "candle-wgpu"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
