[package]
name = "brainwires-providers"
description = "AI provider implementations for the Brainwires Agent Framework"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
readme = "README.md"
documentation = "https://docs.rs/brainwires-providers"
keywords = ["ai-providers", "llm", "anthropic", "openai", "google"]
categories = ["api-bindings"]

[dependencies]
brainwires-core = { workspace = true }
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }

# Always needed for local_llm module (always compiled)
async-trait = { workspace = true }
futures = { workspace = true }
dirs = { workspace = true }

# HTTP providers (native feature)
reqwest = { workspace = true, optional = true, features = ["multipart"] }
async-stream = { workspace = true, optional = true }
tracing = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }
uuid = { workspace = true, optional = true }

# Local LLM inference (optional heavy dep)
llama-cpp-2 = { version = "0.1", optional = true }
encoding_rs = { workspace = true, optional = true }

# Bedrock auth (AWS SigV4) — official AWS crates
aws-sigv4 = { workspace = true, optional = true }
aws-credential-types = { workspace = true, optional = true }
aws-smithy-runtime-api = { workspace = true, optional = true }
http = { workspace = true, optional = true }

# Vertex AI auth (Google OAuth2)
gcp_auth = { workspace = true, optional = true }

# Analytics (optional)
brainwires-telemetry = { workspace = true, optional = true }
chrono = { workspace = true, optional = true }

# WebSocket transport (OpenAI Responses API)
tokio-tungstenite = { workspace = true, optional = true }
url = { workspace = true, optional = true }

[features]
default = ["native"]
native = [
    "dep:reqwest", "dep:async-stream",
    "dep:tracing", "dep:tokio", "dep:uuid",
    "dep:tokio-tungstenite", "dep:url",
]
llama-cpp-2 = ["dep:tracing", "dep:tokio", "dep:llama-cpp-2", "dep:encoding_rs"]
bedrock = ["native", "dep:aws-sigv4", "dep:aws-credential-types", "dep:aws-smithy-runtime-api", "dep:http"]
vertex-ai = ["native", "dep:gcp_auth"]
telemetry = ["dep:brainwires-telemetry", "brainwires-telemetry/native", "dep:chrono"]

[dev-dependencies]
serde_json = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
reqwest = { workspace = true }

[[example]]
name = "provider_factory"
required-features = ["native"]

[[example]]
name = "rate_limited_client"
required-features = ["native"]
