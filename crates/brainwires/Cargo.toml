[package]
name = "brainwires"
description = "The Brainwires Agent Framework — build any AI application in Rust"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
readme = "README.md"
documentation = "https://docs.rs/brainwires"
keywords = ["ai-agents", "llm", "mcp", "multi-agent", "framework"]
categories = ["development-tools"]

[dependencies]
# Always available
brainwires-core.workspace = true

# Feature-gated framework crates
brainwires-tool-system = { workspace = true, optional = true }
brainwires-agents = { workspace = true, optional = true }
brainwires-storage = { workspace = true, optional = true }
brainwires-mcp = { workspace = true, optional = true }
brainwires-cognition = { workspace = true, optional = true }
brainwires-permissions = { workspace = true, optional = true }

# Feature-gated existing crates
brainwires-code-interpreters = { workspace = true, optional = true }

# Providers
brainwires-providers = { workspace = true, optional = true }

# Agent network (IPC, remote bridge, mesh)
brainwires-agent-network = { workspace = true, optional = true }

# MCP server framework
brainwires-mcp-server = { workspace = true, optional = true }

# A2A protocol
brainwires-a2a = { workspace = true, optional = true }

# Skills system
brainwires-skills = { workspace = true, optional = true }

# Proxy framework
brainwires-proxy = { workspace = true, optional = true }


# Audio I/O, STT, TTS
brainwires-audio = { workspace = true, optional = true }

# Datasets & Training
brainwires-datasets = { workspace = true, optional = true }
brainwires-training = { workspace = true, optional = true }

# Autonomy
brainwires-autonomy = { workspace = true, optional = true }

# MCP server re-exports (optional)
rmcp = { workspace = true, optional = true }
schemars = { workspace = true, optional = true }
tokio-util = { workspace = true, optional = true }

[dev-dependencies]
tokio = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
async-trait = { workspace = true }
async-stream = { workspace = true }
futures = { workspace = true }

[[example]]
name = "custom_provider"
required-features = ["providers"]

[[example]]
name = "custom_embedding"

[[example]]
name = "agent_quickstart"
required-features = ["agents"]

[[example]]
name = "rag_custom_pipeline"
required-features = ["rag"]

[[example]]
name = "multi_provider_chat"
required-features = ["providers", "chat"]

[[example]]
name = "storage_with_rag"
required-features = ["storage", "rag"]

[features]
default = ["tools", "agents"]
wasm = ["brainwires-core/wasm"]
tools = ["dep:brainwires-tool-system"]
agents = ["dep:brainwires-agents"]
storage = ["dep:brainwires-storage", "brainwires-storage/native"]
mcp = ["dep:brainwires-mcp"]
mdap = ["agents", "brainwires-agents/mdap"]
knowledge = ["brain"]
prompting = ["dep:brainwires-cognition", "brainwires-cognition/prompting"]
permissions = ["dep:brainwires-permissions"]
orchestrator = ["tools", "brainwires-tool-system/orchestrator"]
openapi = ["tools", "brainwires-tool-system/openapi"]
rag = ["dep:brainwires-cognition", "brainwires-cognition/rag", "dep:brainwires-storage", "brainwires-storage/vector-db", "tools", "brainwires-tool-system/rag"]
rag-full-languages = ["rag", "brainwires-cognition/tree-sitter-languages"]
interpreters = ["dep:brainwires-code-interpreters"]
providers = ["dep:brainwires-providers"]
chat = ["providers"]
reasoning = ["agents", "brainwires-agents/reasoning"]
seal = ["agents", "brainwires-agents/seal"]
agent-network = ["dep:brainwires-agent-network"]
mcp-server-framework = ["dep:brainwires-mcp-server"]
skills = ["dep:brainwires-skills"]
eval = ["agents", "brainwires-agents/eval"]
otel = ["agents", "brainwires-agents/otel"]
proxy = ["dep:brainwires-proxy"]
a2a = ["dep:brainwires-a2a", "brainwires-a2a/native"]
mesh = ["agent-network", "brainwires-agent-network/mesh"]
audio = ["dep:brainwires-audio"]
datasets = ["dep:brainwires-datasets"]
training = ["dep:brainwires-training"]
training-cloud = ["training", "brainwires-training/cloud"]
training-local = ["training", "brainwires-training/local"]
training-full = ["training", "brainwires-training/full", "datasets", "brainwires-datasets/full"]
autonomy = ["dep:brainwires-autonomy"]
brain = ["dep:brainwires-cognition", "brainwires-cognition/knowledge"]
bedrock = ["providers", "brainwires-providers/bedrock"]
vertex-ai = ["providers", "brainwires-providers/vertex-ai"]
llama-cpp-2 = ["providers", "brainwires-providers/llama-cpp-2"]
mcp-server = ["dep:rmcp", "dep:schemars", "dep:tokio-util"]
# Convenience: enables all learning/knowledge subsystems with integration
learning = ["seal", "knowledge", "permissions", "brainwires-agents/seal-knowledge", "brainwires-agents/seal-feedback"]
# Convenience: everything needed for agent workflows
agent-full = ["agents", "permissions", "prompting", "tools"]
# Convenience: everything a researcher typically needs
researcher = ["providers", "agents", "storage", "rag", "training", "datasets"]
full = [
    "tools", "agents", "storage", "mcp", "mdap", "knowledge",
    "prompting", "permissions", "orchestrator", "rag-full-languages", "interpreters",
    "providers", "chat", "reasoning", "seal", "agent-network",
    "brainwires-agents/seal-knowledge", "brainwires-agents/seal-mdap", "brainwires-agents/seal-feedback",
    "llama-cpp-2", "mcp-server", "skills", "eval", "proxy",
    "a2a", "mesh", "audio", "mcp-server-framework",
    "training-cloud", "datasets",
    "autonomy",
]

