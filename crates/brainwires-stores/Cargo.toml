[package]
name = "brainwires-stores"
description = "Opinionated minimum data-store set for the Brainwires Agent Framework — sessions, conversations, tasks, plans, locks, images, and tiered hot/warm/cold memory. All built on the brainwires-storage StorageBackend trait."
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
readme = "README.md"
documentation = "https://docs.rs/brainwires-stores"
keywords = ["sessions", "persistence", "agent-memory", "tiered-memory", "lancedb"]
categories = ["asynchronous", "database"]

[dependencies]
# Internal — always present
brainwires-core = { workspace = true }

# Internal — pulled by every backed-by-StorageBackend store (memory/* and the
# Phase 10b CLI-domain stores). Kept always-on rather than feature-gated to
# avoid having to re-gate every store individually; the dep itself is light
# until its `native` feature pulls Lance.
brainwires-storage = { workspace = true, features = ["native"] }

# Async + serde + errors + ids + time — needed by every store
anyhow = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["sync", "time"] }
tracing = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }

# Arrow schema (used by memory/*_schema() helpers under the `memory` feature)
arrow-schema = { workspace = true, optional = true }

# rusqlite — drives SqliteSessionStore + LockStore (Phase 10b)
rusqlite = { workspace = true, optional = true }

# Async streams (dream offline consolidation)
futures = { workspace = true, optional = true }

# Optional telemetry hook for dream cycles
brainwires-telemetry = { workspace = true, optional = true }

[features]
default = ["session", "task", "plan", "conversation"]

# Session transcript persistence (was brainwires-session)
session = []
sqlite = ["dep:rusqlite"]

# Task / agent-state persistence (Phase 10b)
task = []

# Plan + plan-template persistence (Phase 10b)
plan = []

# Conversation catalog metadata (Phase 10b)
conversation = []

# Coordination locks (Phase 10b — rusqlite-backed)
lock = ["dep:rusqlite"]

# Image storage with metadata (Phase 10b)
image = []

# Tiered hot/warm/cold memory (was brainwires-memory). Pulls arrow-schema
# for the memory/*_schema() helpers.
memory = ["dep:arrow-schema"]

# TieredMemory orchestration over the memory tier stores
tiered = ["memory"]

# Offline consolidation engine — produces summaries / facts and demotes tiers
dream = ["tiered", "dep:futures"]

# Wire dream's `with_analytics` hook to brainwires-telemetry's AnalyticsCollector
telemetry = ["dream", "dep:brainwires-telemetry"]

[dev-dependencies]
tempfile.workspace = true
tokio = { workspace = true, features = ["full", "test-util"] }

[[example]]
name = "tiered_memory"
required-features = ["tiered"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
