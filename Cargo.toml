[workspace]
members = [
    "crates/brainwires-core",
    "crates/brainwires",
    "crates/brainwires-tools",
    "crates/brainwires-agents",
    "crates/brainwires-storage",
    "crates/brainwires-mcp",
    "crates/brainwires-mdap",
    "crates/brainwires-knowledge",
    "crates/brainwires-prompting",
    "crates/brainwires-permissions",
    "crates/brainwires-rag",
    "crates/brainwires-code-interpreters",
    "crates/brainwires-wasm",
    "crates/brainwires-bridge",
    "crates/brainwires-bridge-client",
    "crates/brainwires-inference",
    "crates/brainwires-seal",
    "crates/brainwires-providers",
    "crates/brainwires-skills",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/Brainwires/brainwires-framework"
homepage = "https://github.com/Brainwires/brainwires-framework"
authors = ["Brainwires"]

[workspace.dependencies]
# Internal crates
brainwires-core = { path = "crates/brainwires-core", version = "0.1.0" }
brainwires-tools = { path = "crates/brainwires-tools", version = "0.1.0" }
brainwires-agents = { path = "crates/brainwires-agents", version = "0.1.0" }
brainwires-storage = { path = "crates/brainwires-storage", version = "0.1.0" }
brainwires-mcp = { path = "crates/brainwires-mcp", version = "0.1.0" }
brainwires-mdap = { path = "crates/brainwires-mdap", version = "0.1.0" }
brainwires-knowledge = { path = "crates/brainwires-knowledge", version = "0.1.0" }
brainwires-prompting = { path = "crates/brainwires-prompting", version = "0.1.0" }
brainwires-permissions = { path = "crates/brainwires-permissions", version = "0.1.0" }
brainwires-rag = { path = "crates/brainwires-rag", version = "0.1.1" }
brainwires-code-interpreters = { path = "crates/brainwires-code-interpreters", version = "0.1.0" }
brainwires-wasm = { path = "crates/brainwires-wasm", version = "0.1.0" }
brainwires-bridge = { path = "crates/brainwires-bridge", version = "0.1.0" }
brainwires-bridge-client = { path = "crates/brainwires-bridge-client", version = "0.1.0" }
brainwires-inference = { path = "crates/brainwires-inference", version = "0.1.0" }
brainwires-seal = { path = "crates/brainwires-seal", version = "0.1.0" }
brainwires-providers = { path = "crates/brainwires-providers", version = "0.1.0" }
brainwires-skills = { path = "crates/brainwires-skills", version = "0.1.0" }

# Async runtime & utilities
tokio = { version = "1.43", features = ["full"] }
futures = "0.3"
async-trait = "0.1"
async-stream = "0.3"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"

# Error handling
anyhow = "1"
thiserror = "2"

# Identifiers & time
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }

# HTTP
reqwest = { version = "0.12", features = ["json", "stream"] }

# MCP protocol
rmcp = { version = "0.8", features = ["client", "server", "transport-sse-client", "transport-child-process", "transport-io", "macros"] }

# MCP server support
schemars = "1.0"
tokio-util = "0.7"

# Logging
tracing = "0.1"
tracing-subscriber = "0.3"

# Vector database & columnar storage
lancedb = "0.23"
arrow = "56.2"
arrow-array = "56.2"
arrow-schema = "56.2"

# Caching
lru = "0.12"

# Hashing
sha2 = "0.10"

# SQLite
rusqlite = { version = "0.31", features = ["bundled"] }

# File operations
walkdir = "2.5"
diffy = "0.4"
glob = "0.3"

# Code search
regex = "1"
ignore = "0.4"

# URL encoding
urlencoding = "2"

# Filesystem paths
dirs = "6"

# Git
git2 = "0.19"

# Security
zeroize = { version = "1", features = ["derive"] }

# Config parsing
toml = "0.8"

# ML / Clustering
linfa = "0.7"
linfa-clustering = "0.7"
ndarray = "0.15"

# Binary encoding
bincode = "1"

# Crypto
chacha20poly1305 = "0.10"
rand = "0.8"
base64 = "0.22"
hex = "0.4"
subtle = "2.6"

# Keyring (secure key storage)
keyring = "3"

# WebSocket
tokio-tungstenite = { version = "0.21", features = ["native-tls"] }

# URL parsing
url = "2.5"

# Hostname
gethostname = "1.0"

# Compression
flate2 = "1.0"
zstd = "0.13"

# Local LLM inference (optional)
llama-cpp-2 = "0.1"

# Testing
tempfile = "3"
