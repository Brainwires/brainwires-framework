[package]
name = "brainwires-training"
# Deprecation marker version — sits between the retired 0.10.0 (which
# contained cloud + local fine-tuning under the misnomer "training") and
# the new 0.11.0 placeholder (`crates/brainwires-training`, reserved for
# future training-from-scratch primitives).
version = "0.10.1"
edition = "2024"
license = "MIT OR Apache-2.0"
rust-version = "1.91"
description = "DEPRECATED 0.10.x content (cloud + local fine-tuning) — moved to `brainwires-finetune` and `brainwires-finetune-local`. The `brainwires-training` name is reserved for actual training-from-scratch in 0.11+."
repository = "https://github.com/Brainwires/brainwires-framework"
readme = "README.md"
keywords = ["deprecated"]

[lib]
path = "src/lib.rs"

[workspace]
